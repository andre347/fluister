<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!-- 5-bar waveform, monochrome black on transparent so macOS template-image
       tinting takes over (auto-flips for light vs dark menu bars). Heights
       mirror the dictation overlay: tallest in the middle, tapering out. -->
  <g fill="black">
    <rect x="3"    y="8" width="2" height="6"  rx="1" />
    <rect x="6.5"  y="6" width="2" height="10" rx="1" />
    <rect x="10"   y="3" width="2" height="16" rx="1" />
    <rect x="13.5" y="6" width="2" height="10" rx="1" />
    <rect x="17"   y="8" width="2" height="6"  rx="1" />
  </g>
</svg>
