<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fluister — marketing site explorations</title>

<!-- React 18.3.1 + Babel pinned -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --amber: #E8A961;
    --amber-dark: #F2B570;
    --amber-ink: #B27A30;

    --paper-warm: #f8f4ec;        /* warm white surface */
    --paper-warmer: #f1ead9;      /* slightly more saturated cream */
    --ink: #1a1714;               /* warm near-black text */
    --ink-soft: #4a4138;
    --ink-mute: #8a7e72;
    --rule: rgba(26,23,20,0.08);
    --rule-strong: rgba(26,23,20,0.16);

    --red: #c45844;

    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }

  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    color: var(--ink);
    background: #f0eee9;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* shared bits used across heroes */
  .mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1, "ss01" 1; }
  .kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 5px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--ink); background: #fff;
    border: 0.5px solid var(--rule-strong);
    border-bottom-width: 1.5px;
    border-radius: 4px;
    line-height: 1;
  }

  /* the recording pill — the reusable hero motif */
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(26,23,20,0.92);
    backdrop-filter: blur(20px);
    border-radius: 999px;
    padding: 7px 13px;
    color: #fbf8f2;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18), 0 1px 0 rgba(255,255,255,0.06) inset;
    font-family: var(--font-sans);
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 1.4s ease-in-out infinite; }
  .pill .timer { font-family: var(--font-mono); font-size: 10px; color: #c8bfb4; min-width: 22px; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.55 } }

  /* live waveform — driven by CSS vars set from JS */
  .wave { display: inline-flex; align-items: center; gap: 2px; height: 14px; }
  .wave i {
    display: block; width: 2px; border-radius: 1px;
    background: currentColor; opacity: 0.92;
    transition: height 90ms ease-out;
  }

  /* fake desktop window chrome — for hero vignettes */
  .mac-win {
    border-radius: 10px;
    background: #fff;
    box-shadow: 0 24px 60px rgba(20,16,10,0.18), 0 1px 0 rgba(255,255,255,0.6) inset, 0 0 0 0.5px rgba(0,0,0,0.18);
    overflow: hidden;
  }
  .mac-win .titlebar {
    height: 28px; display: flex; align-items: center; gap: 8px;
    padding: 0 12px; border-bottom: 0.5px solid rgba(0,0,0,0.08);
    background: linear-gradient(#fbfaf7,#f1eee7);
  }
  .mac-win .tl { display: inline-flex; gap: 7px; }
  .mac-win .tl span { width: 11px; height: 11px; border-radius: 50%; }
  .mac-win .tl span:nth-child(1) { background: #ff5f57 }
  .mac-win .tl span:nth-child(2) { background: #febc2e }
  .mac-win .tl span:nth-child(3) { background: #28c840 }
  .mac-win .title { font-size: 12px; color: var(--ink-soft); margin-left: 4px; font-weight: 500; }

  /* caret blink for typed-into-window demos */
  .caret { display: inline-block; width: 1px; height: 1.05em; vertical-align: -2px; background: currentColor; margin-left: 1px; animation: caret 1s steps(1) infinite; }
  @keyframes caret { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }

  /* nice subtle paper grain (very subtle) */
  .grain { position: relative; }
  .grain::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 3px 3px; opacity: 0.4; mix-blend-mode: multiply;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="image-slot.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hero-shared.jsx"></script>
<script type="text/babel" src="hero-quiet.jsx"></script>
<script type="text/babel" src="hero-character.jsx"></script>
<script type="text/babel" src="hero-typographic.jsx"></script>
<script type="text/babel" src="hero-livedemo.jsx"></script>
<script type="text/babel" src="wordmarks.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
